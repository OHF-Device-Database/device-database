            margin: 0;
        }

            opacity: 0.9;
            font-weight: 300;
            margin: 0;
        }

            opacity: 0.75;
            font-weight: 300;
            margin: 0.5rem 0 0 0;
            font-style: italic;
        }

            gap: 1.5rem;
            max-width: 1400px;
            margin: 3rem auto 3rem;
            padding: 0 2rem;

            margin-bottom: 0.5rem;
        }

            color: var(--ohf-text-light);

            letter-spacing: 0.5px;
            font-weight: 500;
        }

            margin: 0 auto;
            padding: 2rem;
        }

        .charts-grid {
            display: grid;
            gap: 2rem;
            margin-bottom: 2rem;
        }

            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .chart-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
        }

        .chart-card h3 {
            font-size: 1.2rem;
            color: var(--ohf-text);
            margin-bottom: 0.5rem;
            font-weight: 600;
            line-height: 1.4;
        }

        .chart-meta {
            font-size: 0.85rem;
            color: var(--ohf-text-light);
            margin-bottom: 1.5rem;
        }

        .chart-container {
            position: relative;
            height: 400px;
        }

        .chart-container.horizontal {
            height: auto;
            min-height: 300px;
        }

        .chart-container.small {
            height: 300px;
        }

        .response-list {
            max-height: 600px;
            overflow-y: auto;
            padding: 0;
            margin: 0;
        }

        .response-list li {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--ohf-border);
            list-style: none;
            position: relative;
            padding-left: 2.5rem;
        }

        .response-list li:last-child {
            border-bottom: none;
        }

        .response-list li:before {
            content: counter(item);
            counter-increment: item;
            position: absolute;
            left: 1rem;
            color: var(--ohf-primary);
            font-weight: 600;
            font-size: 0.9rem;
        }

        .response-list {
            counter-reset: item;
        }

        .response-list li:hover {
            background: var(--ohf-bg-alt);
        }

        .contact-summary {
            padding: 2rem;
            background: linear-gradient(135deg, #E8F5E9 0%, #C8E6C9 100%);
            border-radius: 8px;
            text-align: center;
        }

            font-size: 4rem;
            font-weight: 700;
            color: var(--ohf-success);
            line-height: 1;
            margin-bottom: 0.5rem;
        }

            color: var(--ohf-text);
            margin-bottom: 1rem;
        }

        .contact-summary .detail {
            font-size: 1rem;
            color: var(--ohf-text-light);
        }

            }

            .stat-card .number {
                font-size: 2.5rem;
            }

            .container {
                padding: 1rem;

            background: linear-gradient(135deg, #E3F2FD 0%, #BBDEFB 100%);

            padding: 2rem;
            border-radius: 8px;
            margin: 2rem 0;

            padding-left: 0;

            left: 0;
            color: var(--ohf-primary);

        const colors = {
            primary: '#18bcf2',
            primaryLight: '#5fd0f5',
            secondary: '#00A3E0',
            accent: '#FF6B35',
            success: '#00C853',
            palette: [
                '#18bcf2', '#00A3E0', '#4CAF50', '#FF9800', '#E91E63',
                '#9C27B0', '#673AB7', '#3F51B5', '#00BCD4', '#009688',
                '#8BC34A', '#CDDC39', '#FFC107', '#FF5722', '#795548',
                '#607D8B', '#26A69A', '#66BB6A', '#AB47BC', '#5C6BC0'
            ]
        };

        const commonOptions = {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: {
                    position: 'top',
                    labels: {
                        font: {
                            size: 11,
                            family: '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto'
                        },
                        padding: 12
                    }
                },
                tooltip: {
                    backgroundColor: 'rgba(0, 0, 0, 0.9)',
                    padding: 16,
                    titleFont: {
                        size: 13,
                        weight: 'bold'
                    },
                    bodyFont: {
                        size: 12
                    },
                    titleMarginBottom: 10,
                    bodySpacing: 6,
                    cornerRadius: 8,
                    displayColors: true,
                    boxWidth: 12,
                    boxHeight: 12
                }
            }
        };

        function createBarChart(canvasId, data, label) {
            const ctx = document.getElementById(canvasId).getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: Object.keys(data),
                    datasets: [{
                        label: label,
                        data: Object.values(data),
                        backgroundColor: colors.primary,
                        borderWidth: 0,
                        borderRadius: 6
                    }]
                },
                options: {
                    ...commonOptions,
                    plugins: {
                        ...commonOptions.plugins,
                        legend: {
                            display: false
                        },
                        tooltip: {
                            ...commonOptions.plugins.tooltip,
                            callbacks: {
                                title: function(context) {
                                    // Show full label on hover
                                    return context[0].label;
                                },
                                label: function(context) {
                                    return 'Count: ' + context.parsed.y;
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: { precision: 0 },
                            grid: { color: 'rgba(0, 0, 0, 0.05)' }
                        },
                        x: {
                            grid: { display: false },
                            ticks: {
                                callback: function(value, index, ticks) {
                                    // Truncate long labels on x-axis
                                    const label = this.getLabelForValue(value);
                                    return label.length > 20 ? label.substring(0, 20) + '...' : label;
                                }
                            }
                        }
                    }
                }
            });
        }

        function createHorizontalBarChart(canvasId, data, label) {
            const ctx = document.getElementById(canvasId).getContext('2d');
            const labels = Object.keys(data);
            const values = Object.values(data);
            
            const canvas = document.getElementById(canvasId);
            canvas.parentElement.style.height = `${Math.max(300, labels.length * 35)}px`;
            
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: label,
                        data: values,
                        backgroundColor: colors.palette,
                        borderWidth: 0,
                        borderRadius: 6
                    }]
                },
                options: {
                    ...commonOptions,
                    indexAxis: 'y',
                    plugins: {
                        ...commonOptions.plugins,
                        legend: {
                            display: false
                        },
                        tooltip: {
                            ...commonOptions.plugins.tooltip,
                            callbacks: {
                                title: function(context) {
                                    // Show full label on hover with word wrapping
                                    return context[0].label;
                                },
                                label: function(context) {
                                    return 'Responses: ' + context.parsed.x;
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            beginAtZero: true,
                            ticks: { precision: 0 },
                            grid: { color: 'rgba(0, 0, 0, 0.05)' }
                        },
                        y: {
                            grid: { display: false },
                            ticks: {
                                font: { size: 10 },
                                callback: function(value, index, ticks) {
                                    // Truncate long labels on y-axis
                                    const label = this.getLabelForValue(value);
                                    return label.length > 50 ? label.substring(0, 50) + '...' : label;
                                }
                            }
                        }
                    }
                }
            });
        }

        function createPieChart(canvasId, data) {
            const ctx = document.getElementById(canvasId).getContext('2d');
            new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(data),
                    datasets: [{
                        data: Object.values(data),
                        backgroundColor: colors.palette,
                        borderWidth: 2,
                        borderColor: '#fff'
                    }]
                },
                options: {
                    ...commonOptions,
                    cutout: '60%',
                    plugins: {
                        ...commonOptions.plugins,
                        legend: {
                            position: 'right',
                            labels: {
                                font: { size: 10 },
                                padding: 8,
                                boxWidth: 12,
                                generateLabels: function(chart) {
                                    const data = chart.data;
                                    if (data.labels.length && data.datasets.length) {
                                        const total = data.datasets[0].data.reduce((a, b) => a + b, 0);
                                        return data.labels.map((label, i) => {
                                            const value = data.datasets[0].data[i];
                                            const percentage = ((value / total) * 100).toFixed(1);
                                            // Truncate label for legend display and add percentage
                                            const displayLabel = label.length > 25 ? label.substring(0, 25) + '...' : label;
                                            return {
                                                text: displayLabel + ` (${percentage}%)`,
                                                fillStyle: data.datasets[0].backgroundColor[i],
                                                hidden: false,
                                                index: i,
                                                // Store full label for tooltip
                                                fullText: label
                                            };
                                        });
                                    }
                                    return [];
                                }
                            }
                        },
                        tooltip: {
                            ...commonOptions.plugins.tooltip,
                            callbacks: {
                                title: function(context) {
                                    // Show full label on hover
                                    return context[0].label;
                                },
                                label: function(context) {
                                    const total = context.dataset.data.reduce((a, b) => a + b, 0);
                                    const value = context.parsed;
                                    const percentage = ((value / total) * 100).toFixed(1);
                                    return 'Count: ' + value + ' (' + percentage + '%)';
                                }
                            }
                        }
                    }
                }
            });
        }

        function cleanData(data) {
            // Return data as-is without any modifications
            return data;
        }

        function renderChart(containerId, chartId, chartInfo) {
            const container = document.getElementById(containerId);
            const canvasId = `canvas-${chartId}`;
            
            const chartCard = document.createElement('div');
            chartCard.className = 'chart-card';
            
            const title = document.createElement('h3');
            title.textContent = chartInfo.title;
            chartCard.appendChild(title);
            
            if (chartInfo.total_respondents || chartInfo.likert_average) {
                const meta = document.createElement('div');
                meta.className = 'chart-meta';
                let metaText = '';
                if (chartInfo.total_respondents) {
                    metaText = `${chartInfo.total_respondents} responses`;
                }
                if (chartInfo.likert_average) {
                    if (metaText) metaText += ' | ';
                    metaText += `Average: ${chartInfo.likert_average}/5`;
                }
                meta.textContent = metaText;
                chartCard.appendChild(meta);
            }
            
            // Handle list type differently
            if (chartInfo.type === 'list') {
                const listContainer = document.createElement('ol');
                listContainer.className = 'response-list';
                
                // chartInfo.data is an array for list types
                chartInfo.data.forEach(response => {
                    const li = document.createElement('li');
                    li.textContent = response;
                    // Add title attribute for full text on hover
                    li.title = response;
                    listContainer.appendChild(li);
                });
                
                chartCard.appendChild(listContainer);
            } else if (chartInfo.type === 'contact_summary') {
                // Handle contact consent summary
                const summaryContainer = document.createElement('div');
                summaryContainer.className = 'contact-summary';
                
                const bigNumber = document.createElement('div');
                bigNumber.className = 'big-number';
                bigNumber.textContent = chartInfo.contact_yes_percentage + '%';
                summaryContainer.appendChild(bigNumber);
                
                const description = document.createElement('div');
                description.className = 'description';
                description.textContent = `${chartInfo.contact_yes_count} respondents open to being contacted`;
                summaryContainer.appendChild(description);
                
                const detail = document.createElement('div');
                detail.className = 'detail';
                detail.textContent = `Out of ${chartInfo.total_respondents} who answered this question`;
                summaryContainer.appendChild(detail);
                
                chartCard.appendChild(summaryContainer);
            } else {
                // Regular chart rendering
                const chartDiv = document.createElement('div');
                chartDiv.className = chartInfo.type === 'horizontal_bar' ? 'chart-container horizontal' : 
                                    chartInfo.type === 'pie' ? 'chart-container small' : 'chart-container';
                
                const canvas = document.createElement('canvas');
                canvas.id = canvasId;
                chartDiv.appendChild(canvas);
                chartCard.appendChild(chartDiv);
                
                container.appendChild(chartCard);
                
                // Render the chart
                setTimeout(() => {
                    const cleanedData = cleanData(chartInfo.data);
                    
                    if (chartInfo.type === 'bar') {
                        createBarChart(canvasId, cleanedData, 'Responses');
                    } else if (chartInfo.type === 'horizontal_bar') {
                        createHorizontalBarChart(canvasId, cleanedData, 'Responses');
                    } else if (chartInfo.type === 'pie') {
                        createPieChart(canvasId, cleanedData);
                    }
                }, 100);
                
                return; // Exit early for chart types
            }
            
            container.appendChild(chartCard);
        }

        window.addEventListener('load', function() {
            // Populate high-level summary
            if (surveyData.high_level_summary) {
                const summaryList = document.getElementById('summary-points');
                if (summaryList) {
                    surveyData.high_level_summary.forEach(item => {
                        const li = document.createElement('li');
                        const strong = document.createElement('strong');
                        strong.textContent = item.category + ': ';
                        li.appendChild(strong);
                        li.appendChild(document.createTextNode(item.point));
                        summaryList.appendChild(li);
                    });
                }
            }
            
            // Populate dynamic stats
            document.getElementById('response-count').textContent = surveyData.total_responses;
            document.getElementById('totalResponses').textContent = surveyData.total_responses;
            
            // Find contribution likelihood average
            for (const chartInfo of surveyData.charts) {
                if (chartInfo.title.includes('How likely are you to contribute') && chartInfo.likert_average) {
                    document.getElementById('avgContribution').textContent = chartInfo.likert_average + '/5';
                    break;
                }
            }
            
            // Calculate Europe percentage
            for (const chartInfo of surveyData.charts) {
                if (chartInfo.title.includes('In what region')) {
                    const europeCount = chartInfo.data['Europe'] || 0;
                    const totalRegionResponses = Object.values(chartInfo.data).reduce((a, b) => a + b, 0);
                    const europePercent = Math.round((europeCount / totalRegionResponses) * 100);
                    document.getElementById('europePercent').textContent = europePercent + '%';
                    break;
                }
            }
            
            // Render all charts in original order
            const container = document.getElementById('all-charts');
            surveyData.charts.forEach((chartInfo, index) => {
                renderChart('all-charts', `chart-${index}`, chartInfo);
            });
        });
    </script>
