name: qa-server

on: [push]

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          lfs: true
      - name: setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version-file: ".nvmrc"
          cache: npm
          cache-dependency-path: |
            project/server/package-lock.json
            project/client/package-lock.json
            schema/package-lock.json
      - name: install dependencies (schema / npm)
        working-directory: schema
        run: npm ci
      - name: build schema
        working-directory: schema
        run: make build
      - name: install dependencies (server / npm)
        working-directory: project/server
        run: npm ci
      - name: install dependencies (client / npm)
        working-directory: project/client
        run: npm ci
      - name: install dependencies (server / sqlc)
        run: make install-dependency-sqlc
      - name: lint
        working-directory: project/server
        run: make lint

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          lfs: true
      - name: setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version-file: ".nvmrc"
          cache: npm
          cache-dependency-path: |
            project/server/package-lock.json
            project/client/package-lock.json
            schema/package-lock.json
      - name: install dependencies (schema / npm)
        working-directory: schema
        run: npm ci
      - name: build schema
        working-directory: schema
        run: make build
      - name: install dependencies (server / npm)
        working-directory: project/server
        run: npm ci
      - name: install dependencies (client / npm)
        working-directory: project/client
        run: npm ci
      - name: install dependencies (server / sqlc)
        run: make install-dependency-sqlc
      - name: test
        working-directory: project/server
        run: make test
