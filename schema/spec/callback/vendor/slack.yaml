SlashCommand:
  type: object
  required:
    - command
    - text
  # https://docs.slack.dev/interactivity/implementing-slash-commands/#command_payload_descriptions
  properties:
    channel_id:
      type: string
    channel_name:
      type: string
    user_id:
      type: string
    command:
      type: string
    text:
      type: string
    response_url:
      type: string
    trigger_id:
      type: string
    api_app_id:
      type: string

BlockText:
  type: object
  required:
    - type
    - text
  properties:
    type:
      type: string
      enum:
        - mrkdwn
    text:
      type: string
BlockField:
  type: object
  required:
    - type
    - text
  properties:
    type:
      type: string
      enum:
        - mrkdwn
    text:
      type: string
Block:
  oneOf:
    - type: object
      required:
        - type
        - text
      properties:
        type:
          type: string
          const: section
        text:
          $ref: "#/BlockText"
    - type: object
      required:
        - type
        - text
        - fields
      properties:
        type:
          type: string
          const: section
        text:
          $ref: "#/BlockText"
        fields:
          type: array
          items:
            $ref: "#/BlockField"
    - type: object
      required:
        - type
        - fields
      properties:
        type:
          type: string
          const: section
        fields:
          type: array
          items:
            $ref: "#/BlockField"

SlashCommandResponse:
  type: object
  required:
    - response_type
  properties:
    response_type:
      type: string
      enum:
        - in_channel
        - ephemeral
    blocks:
      type: array
      items:
        $ref: "#/Block"
