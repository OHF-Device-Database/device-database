# pluralization rules
# * collection resource endpoints should always pluralize
#   the resource as part of the path, but only pluralize the `operationId` if the operation
#   is returning that resource itself
#   ❌ [get] `/thing`
#   ✅ [get] `/things` / `getThings`
#   ❌ [get] `/thing/{id}`
#   ❌ [get] `/things/{id}` / `getThings`
#   ✅ [get] `/things/{id}` / `getThing`

---
openapi: "3.0.0"
info:
  version: 1.0.0
  title: device database
paths:
  /api/v1/snapshot/1:
    post:
      operationId: postSnapshot1
      parameters:
        - in: header
          name: x-device-database-submission-identifier
          schema:
            type: string
        - in: header
          name: user-agent
          schema:
            example: home-assistant/2025.12.1
            type: string
          required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "snapshot/1.yaml#/SnapshotV1"
      responses:
        "200":
          description: "success"
          content:
            application/json:
              schema:
                $ref: "snapshot/1.yaml#/SnapshotV1ResponseSuccess"
        "400":
          description: "client error"
          content:
            application/json:
              schema:
                $ref: "snapshot/1.yaml#/SnapshotV1ResponseErrorClient"
        "500":
          description: "server error"
          content:
            text/plain:
              schema:
                $ref: "snapshot/1.yaml#/SnapshotV1ResponseErrorServer"

  /api/v1/callback/vendor/slack/slash-command:
    post:
      operationId: postCallbackVendorSlackSlashCommand
      parameters:
        - in: header
          name: x-slack-signature
          schema:
            type: string
          required: true
        - in: header
          name: x-slack-request-timestamp
          schema:
            type: string
          required: true
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "callback/vendor/slack.yaml#/SlashCommand"
      responses:
        "200":
          description: "response to command"
          content:
            application/json:
              schema:
                $ref: "callback/vendor/slack.yaml#/SlashCommandResponse"
        "400":
          description: "request payload verification failed"
          content:
            text/plain:
              schema:
                type: string
                enum:
                  - "request timestamp too far out of sync"
                  - "request payload verification failed"
        "500":
          description: "callback not configured"
          content:
            text/plain:
              schema:
                type: string
                enum:
                  - "callback not configured"
                  -
  /api/unstable/derived/devices:
    get:
      operationId: getDerivedDevices
      parameters:
        - in: query
          name: term
          schema:
            type: string
      responses:
        "200":
          description: "derived devices"
          headers:
            cache-control:
              required: true
              schema:
                type: string
                const: "max-age=1800"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "derived/device.yaml#/DerivedDeviceCounted"

  /api/unstable/derived/devices/{id}:
    get:
      operationId: getDerivedDevice
      parameters:
        - in: path
          name: id
          schema:
            type: string
          required: true
      responses:
        "200":
          description: "device details"
          headers:
            cache-control:
              required: true
              schema:
                type: string
                const: "max-age=604800, immutable"
          content:
            application/json:
              schema:
                $ref: "derived/device.yaml#/DerivedDevice"
        "404":
          description: "device not found"
          content:
            text/plain:
              schema:
                type: string
                const: not found

  /api/v1/health:
    get:
      operationId: getHealth
      responses:
        "200":
          description: "api is in good health"
          content:
            text/plain:
              schema:
                type: string
                const: ok
        "500":
          description: "api is in bad health"
          content:
            text/plain:
              schema:
                type: string
                const: not ok
