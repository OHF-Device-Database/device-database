DerivedDeviceMono:
  allOf:
    - type: object
      required:
        - integration
        - manufacturer
      properties:
        integration:
          type: string
        manufacturer:
          type: string
    - oneOf:
        - type: object
          required:
            - model
            - model_id
          properties:
            model:
              type: string
            model_id:
              type: string
        - type: object
          required:
            - model
          properties:
            model:
              type: string
            model_id:
              type: string
        - type: object
          required:
            - model_id
          properties:
            model:
              type: string
            model_id:
              type: string
DerivedDeviceMonoCounted:
  allOf:
    - $ref: "#/DerivedDeviceMono"
    - type: object
      required:
        - count
      properties:
        count:
          type: integer

DerivedDevicePoly:
  allOf:
    - $ref: "#/DerivedDeviceMono"
    - type: object
      required:
        - id
      properties:
        id:
          type: string
          format: uuid
DerivedDevicePolyCounted:
  allOf:
    - $ref: "#/DerivedDevicePoly"
    - type: object
      required:
        - count
      properties:
        count:
          type: integer
